<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mypage/main}">

<div layout:fragment="mypage-content">
    <h3 class="mypage-section-title">예매내역 확인 · 취소</h3>

    <div class="detail-container">
        <h4 class="detail-sub-title" id="performance-title" th:text="${detail.performance.performanceTitle}"></h4>

        <div class="info-section">
            <div class="info-poster">
                <img th:src="@{'/uploads/' + ${detail.performance.posterUrl}}" alt="공연 포스터">
                <div class="poster-buttons">
                    <button class="btn-sm">상세보기</button>
                </div>
            </div>

            <table class="info-table">
                <colgroup>
                    <col style="width: 120px;">
                    <col>
                </colgroup>
                <tr>
                    <th>예매자</th>
                    <td th:text="${detail.user.name}"></td>
                </tr>
                <tr>
                    <th>예약번호</th>
                    <td id="reservation-id" th:text="${detail.reservation.id}" th:attr="data-reservation-id=${detail.reservation.id}"></td>
                </tr>
                <tr>
                    <th>이용일</th>
                    <td th:text="${detail.schedule.formattedPerformanceDate} + ' ' + ${detail.schedule.formattedPerformanceTime}"></td>
                </tr>
                <tr>
                    <th>장소</th>
<!--                    <td>파라다이스시티 <a href="#" class="btn-link">지도보기</a></td>-->
                    <td th:text="${detail.performance.venue}"></td>
                </tr>
                <tr>
                    <th>공연 회차</th>
                    <td th:text="${detail.schedule.round} + '회차'"></td>
                </tr>
                <tr>
                    <th>좌석</th>
                    <td th:text="${detail.seatGrade.seatGradeName}"></td>
                </tr>
                <tr>
                    <th>티켓수령 방법</th>
                    <td>
                        <strong th:text="${detail.reservation.deliveryType}"></strong>
                        <div class="delivery-notice">
                            <p>배송유의사항</p>
                            <ul>
                                <li>모바일티켓은 모바일 디바이스에서만 이용 가능합니다.</li>
                                <li>관람(이용)일에 모바일티켓 내 QR코드를 통해 입장할 수 있습니다.</li>
                            </ul>
                        </div>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <div class="detail-container mt-40">
        <h4 class="detail-sub-title">결제내역</h4>
        <table class="horizontal-info-table">
            <tr>
                <th>예매일</th>
                <td th:text="${detail.reservation.formattedReservedAt}"></td>
                <th>현재상태</th>
                <td>
                    <span class="status-badge"
                          th:text="${detail.reservation.reservationStatus.label}"
                          th:classappend="${detail.reservation.statusClass}"></span>
                </td>
            </tr>
            <tr>
                <th>결제수단</th>
                <td th:text="${detail.payment?.paymentType ?: '결제 정보 없음'}"></td>
                <th>결제상태</th>
                <td th:text="${detail.payment?.paymentStatus ?: '결제 정보 없음'}"></td>
            </tr>
        </table>
    </div>

    <div class="detail-container mt-40">
        <table class="reservation-table">
            <thead>
            <tr>
                <th>예매번호</th>
                <th>공연회차</th>
                <th>좌석등급</th>
                <th>가격</th>
                <th>취소여부</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${detail.reservation.id}"></td>
                <td th:text="${detail.schedule.round} + '회차'"></td>
                <td th:text="${detail.seatGrade.seatGradeName}"></td>
                <td th:text="${#numbers.formatInteger(detail.reservation.totalPrice, 3, 'COMMA') + '원'}"></td>
                <td>
                    <span th:if="${detail.cancelable}" class="cancelable-text">취소 가능</span>
                    <span th:unless="${detail.cancelable}" class="not-cancelable-text"
                          th:text="${detail.reservation.reservationStatus.label}"></span>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="price-summary">
<!--            <p>예매 수수료: 2,000원</p>-->
            <p>배송비: 0원</p>
            <p class="total-price">
                총 결제금액:
                <span id="total-price"
                      th:text="${#numbers.formatInteger(detail.reservation.totalPrice, 3, 'COMMA') + '원'}"
                      th:data-amount="${detail.reservation.totalPrice}">
                </span>
            </p>
        </div>

        <div class="detail-action-group">
            <button type="button" class="btn-list" onclick="location.href='/users/mypage/reservations'">목록으로</button>
            <th:block th:if="${detail.reservation.reservationStatus.name() == 'PENDING'}">
                <button type="button" id="btn-pay" class="btn-pay">결제하기</button>
            </th:block>
            <th:block th:if="${detail.cancelable}">
                <button type="button" id="btn-cancel" class="btn-cancel">예매 취소</button>
            </th:block>
        </div>
    </div>
</div>

<th:block layout:fragment="mypage-style">
    <link rel="stylesheet" th:href="@{/css/mypage/reservations/detail.css}" />
</th:block>
<th:block layout:fragment="page-script">
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <script type="module" src="/js/mypage/reservations/detail.js"></script>
</th:block>
</html>
