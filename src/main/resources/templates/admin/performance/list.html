<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">

<main layout:fragment="content" class="admin-container">

    <div class="admin-header">
        <h2>공연 관리</h2>
        <a href="/admin/performances/register" class="btn btn-primary">공연 등록</a>
    </div>

    <table class="admin-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>공연명</th>
            <th>공연 기간</th>
            <th>티켓 오픈 일시</th>
            <th>상태</th>
            <th>삭제 여부</th>
            <th>관리</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="performance : ${performanceList}">
            <td th:text="${performance.id}"></td>
            <td th:text="${performance.title}"></td>
            <td>
                <span th:text="${#temporals.format(performance.startDateTime, 'yyyy년 M월 d일 HH:mm')}"></span>
                ~
                <span th:text="${#temporals.format(performance.endDateTime, 'yyyy년 M월 d일 HH:mm')}"></span>
            </td>
            <td>
                <span th:text="${#temporals.format(performance.openDateTime, 'yyyy년 M월 d일 HH:mm')}"></span>
            </td>
            <td th:text="${performance.status.label}"></td>
            <td th:text="${performance.isDeleted.label}"></td>
            <td class="action-buttons">
                <a th:href="@{/admin/performances/{id}(id=${performance.id})}"
                   class="btn btn-sm" th:disabled="${performance.isDeleted == 'Y'}">관리</a>
                <button type="button" class="btn btn-sm btn-danger btn-delete"
                        id="btn-delete" th:data-id="${performance.id}"
                        th:if="${#strings.equals(performance.isDeleted, 'N')}">삭제</button>
            </td>
        </tr>
        </tbody>
    </table>

</main>
<th:block layout:fragment="page-script">
    <script type="module" src="/js/admin/performance/list.js"></script>
</th:block>
</html>
