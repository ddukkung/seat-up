<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mypage/main}">

<div layout:fragment="mypage-content">
    <h3 class="mypage-section-title">내 정보 수정</h3>

    <!-- 기본 정보 수정 -->
    <div class="mp-section">
        <div class="mp-section-title">기본 정보 수정</div>
        <hr class="mp-divider">
        <div class="mp-field">
            <label class="mp-label">아이디</label>
            <input class="mp-input" type="text" th:value="${user.loginId}" readonly>
        </div>
        <div class="mp-row">
            <div class="mp-field">
                <label class="mp-label">이름</label>
                <input class="mp-input" type="text" id="name" th:value="${user.name}" placeholder="이름을 입력하세요">
            </div>
            <div class="mp-field">
                <label class="mp-label">핸드폰 번호</label>
                <input class="mp-input" type="text" id="phone-number" th:value="${user.phoneNumber}" placeholder="010-0000-0000">
            </div>
        </div>
        <div class="mp-field">
            <label class="mp-label">이메일</label>
            <input class="mp-input" type="email" id="email" th:value="${user.email}" placeholder="이메일을 입력하세요">
        </div>
        <div class="mp-field">
            <label class="mp-label">주소</label>
            <input class="mp-input" type="text" id="address" th:value="${user.address}" placeholder="주소를 입력하세요">
        </div>
        <div class="mp-btn-row">
            <button class="mp-btn mp-btn-ghost" id="btn-reset" type="button">취소</button>
            <button class="mp-btn mp-btn-primary" id="btn-update-profile" type="button">저장</button>
        </div>
    </div>

    <!-- 비밀번호 변경 -->
    <div class="mp-section">
        <div class="mp-section-title">비밀번호 변경</div>
        <hr class="mp-divider">
        <div class="mp-field">
            <label class="mp-label">현재 비밀번호</label>
            <input class="mp-input" type="password" id="current-password" placeholder="현재 비밀번호를 입력하세요">
        </div>
        <div class="mp-field">
            <label class="mp-label">새 비밀번호</label>
            <input class="mp-input" type="password" id="new-password" placeholder="새 비밀번호를 입력하세요">
        </div>
        <div class="mp-field">
            <label class="mp-label">새 비밀번호 확인</label>
            <input class="mp-input" type="password" id="new-password-confirm" placeholder="새 비밀번호를 다시 입력하세요">
        </div>
        <div class="mp-btn-row">
            <button class="mp-btn mp-btn-primary" id="btn-update-password" type="button">변경</button>
        </div>
    </div>

    <!-- 회원 탈퇴 -->
    <div class="mp-section">
        <div class="mp-section-title">회원 탈퇴</div>
        <hr class="mp-divider">
        <div class="mp-withdraw">
            <p class="mp-withdraw-desc">탈퇴 시 모든 예매 내역 및 계정 정보가<br>영구적으로 삭제되며 복구가 불가능합니다.</p>
            <button class="mp-btn mp-btn-danger" id="btn-withdraw" type="button">회원 탈퇴</button>
        </div>
    </div>
</div>

<th:block layout:fragment="mypage-style">
    <link rel="stylesheet" th:href="@{/css/mypage/info.css}" />
</th:block>
<th:block layout:fragment="page-script">
    <script type="module" src="/js/mypage/info.js"></script>
</th:block>
</html>
