<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">

<main layout:fragment="content">

    <div class="mypage-container">

        <!-- 사이드바 -->
        <aside class="mypage-sidebar">
            <div class="sidebar-profile">
                <div class="profile-avatar">
                    <span th:text="${#strings.substring(user.name, 0, 1)}"></span>
                </div>
                <p class="profile-name" th:text="${user.name}"></p>
                <p class="profile-email" th:text="${user.email}"></p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="/users/mypage/info"
                           th:classappend="${activeMenu == 'info'} ? 'active' : ''">
                            내 정보 수정
                        </a>
                    </li>
                    <li>
                        <a href="/users/mypage/reservations"
                           th:classappend="${activeMenu == 'reservations'} ? 'active' : ''">
                            예매/취소 내역
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 콘텐츠 영역 -->
        <div class="mypage-content">
            <div layout:fragment="mypage-content">
                <!-- 각 페이지 내용 -->
            </div>
        </div>

    </div>

</main>

<th:block layout:fragment="page-style">
    <link rel="stylesheet" th:href="@{/css/mypage/main.css}" />
    <th:block layout:fragment="mypage-style"></th:block>
</th:block>
