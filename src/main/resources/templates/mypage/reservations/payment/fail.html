<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 실패</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f7f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
        }

        .container {
            background: #ffffff;
            border-radius: 20px;
            padding: 56px 48px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 2px 24px rgba(0,0,0,0.06);
        }

        .icon-wrap {
            width: 72px;
            height: 72px;
            background: #fcebeb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
        }

        .icon-wrap svg {
            width: 36px;
            height: 36px;
            stroke: #a32d2d;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .sub {
            font-size: 14px;
            color: #888780;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .error-box {
            background: #fcebeb;
            border-radius: 12px;
            padding: 16px 20px;
            text-align: left;
            margin-bottom: 32px;
        }

        .error-label {
            font-size: 12px;
            color: #a32d2d;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .error-message {
            font-size: 14px;
            color: #791f1f;
            line-height: 1.5;
            word-break: keep-all;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: opacity 0.15s;
        }

        .btn-primary:hover { opacity: 0.85; }

        .btn-secondary {
            background: transparent;
            color: #888780;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: color 0.15s;
        }

        .btn-secondary:hover { color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </div>

        <h1>결제에 실패했어요</h1>
        <p class="sub">결제 처리 중 문제가 발생했습니다.<br>다시 시도하거나 다른 수단으로 결제해 주세요.</p>

        <div class="error-box">
            <p class="error-label">실패 사유</p>
            <p class="error-message" th:text="${errorMessage ?: '알 수 없는 오류가 발생했습니다.'}">
                카드 한도 초과로 결제가 거절되었습니다.
            </p>
        </div>

        <div class="btn-group">
            <a th:href="@{/users/mypage/reservations/{id}(id=${reservationId})}" class="btn-primary">다시 결제하기</a>
            <a href="/users/mypage/reservations" class="btn-secondary">예매내역으로</a>
        </div>
    </div>
</body>
</html>
